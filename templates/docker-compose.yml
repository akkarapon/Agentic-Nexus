# Generated by Agentic-Nexus
# docker-compose.yml — Multi-agent orchestration stack

# ACTIVE_AGENTS_PLACEHOLDER

networks:
  agentic_nexus_bridge:
    name: agentic_nexus_bridge
    driver: bridge

volumes:
  paperclip_data:
  openclaw_data:

services:
  # ────────────────────────────────────────────────────
  # Paperclip — Orchestrator Agent
  # Responsible for planning and delegating tasks to
  # worker agents over the agentic_nexus_bridge network.
  # ────────────────────────────────────────────────────
  paperclip:
    image: ghcr.io/akkappsoft/paperclip:latest
    container_name: paperclip
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_ROLE=orchestrator
      - AGENT_NAME=paperclip
      - OPENCLAW_URL=http://openclaw:8001
    ports:
      - "8000:8000"
    volumes:
      - paperclip_data:/app/data
    networks:
      - agentic_nexus_bridge
    depends_on:
      openclaw:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ────────────────────────────────────────────────────
  # OpenClaw — Worker Agent
  # Executes atomic tasks delegated by Paperclip.
  # ────────────────────────────────────────────────────
  openclaw:
    image: ghcr.io/akkappsoft/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_ROLE=worker
      - AGENT_NAME=openclaw
    ports:
      - "8001:8001"
    volumes:
      - openclaw_data:/app/data
    networks:
      - agentic_nexus_bridge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
