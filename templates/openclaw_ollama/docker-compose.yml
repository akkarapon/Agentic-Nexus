# Generated by Agentic-Nexus
# docker-compose.yml — Multi-agent orchestration stack

# ACTIVE_AGENTS_PLACEHOLDER

networks:
  agentic_nexus_bridge:
    name: agentic_nexus_bridge
    driver: bridge

volumes:
  paperclip_data:
  openclaw_data:
  n8n_data:


services:
  # ============================================================================
  # Ollama – LLM backend (routes cloud models to Minimax/etc.)
  # ============================================================================
  ollama:
    build:
      context: ./docker/ollama
      dockerfile: Dockerfile
    container_name: ${TEAM_NAME:-sempre}-ollama
    environment:
      - OLLAMA_NUM_CTX=16384
      - OLLAMA_KEEP_ALIVE=1h
      - OLLAMA_NUM_PARALLEL=3
      - OLLAMA_MODELS=${OLLAMA_MODELS:-minimax-m2.5:cloud}
      - GOMAXPROCS=1
    volumes:
      - ${HOST_OLLAMA_DIR:-~/.nexus/ollama}:/root/.ollama
    restart: unless-stopped
    networks:
      - agentic_nexus_bridge

  # ────────────────────────────────────────────────────
  # OpenClaw — Worker Agent
  # Executes atomic tasks delegated by Paperclip.
  # ────────────────────────────────────────────────────
  # openclaw:
  #   image: ./docker/openclaw
  #   container_name: openclaw
  #   restart: unless-stopped
  #   env_file:
  #     - .env
  #   environment:
  #     - AGENT_ROLE=worker
  #     - AGENT_NAME=openclaw
  #   ports:
  #     - "8001:8001"
  #   volumes:
  #     - openclaw_data:/app/data
  #   networks:
  #     - agentic_nexus_bridge
  #   healthcheck:
  #     test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 15s

  # ============================================================================
  # OpenClaw Gateway (Ubuntu + SSH)
  # ============================================================================
  openclaw:
    build:
      context: ./docker/openclaw
      dockerfile: Dockerfile
    container_name: ${TEAM_NAME:-sempre}-openclaw
    env_file:
      - .env
    environment:
      - HOME=/root
      - TERM=xterm-256color
      - TEAM_NAME=${TEAM_NAME:-sempre}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_ROOT_PASSWORD=${OPENCLAW_ROOT_PASSWORD:-openclaw}
      - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND:-lan}
      - GATEWAY_ORIGIN=${GATEWAY_ORIGIN:-http://localhost:18789}
      - GATEWAY_ORIGIN_EXTRA=${GATEWAY_ORIGIN_EXTRA:-}
      # LLM
      - OLLAMA_MODEL=${OLLAMA_MODEL:-minimax-m2.5:cloud}
      - OLLAMA_MODELS=${OLLAMA_MODELS:-minimax-m2.5:cloud}
      # KM
      - KM_MAX_HOPS=${KM_MAX_HOPS:-2}
      # Timezone
      - USER_TIMEZONE=${USER_TIMEZONE:-Asia/Bangkok}
      # Per-agent secrets (DISCORD_BOT_TOKEN_{id}, GITHUB_TOKEN_{id}) come from
      # env_file in docker-compose.override.yml (generated by scripts/generate.sh)
      # Brave Search
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      # n8n
      - N8N_API_KEY=${N8N_API_KEY:-}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET:-}
      # Google Workspace
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-/root/.gws/service-account.json}
      - GOOGLE_SERVICE_ACCOUNT_B64=${GOOGLE_SERVICE_ACCOUNT_B64:-}
    volumes:
      - ${HOST_OPENCLAW_DIR:-~/.nexus/openclaw}:/root/.openclaw
      - ${HOST_KM_DIR:-~/.nexus/km}:/root/.km
      - ${HOST_MCPORTER_DIR:-~/.nexus/mcporter}:/root/.mcporter
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "2222:22" # SSH only — web UI is served via nginx SSL
    shm_size: "2gb"
    restart: unless-stopped
    networks:
      default:
        aliases:
          - agentic_nexus_bridge
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://$(hostname -I | awk '{print $1}'):18789/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - ollama

  # ============================================================================
  # nginx – SSL reverse proxy for OpenClaw (Tailscale HTTPS)
  # Terminates TLS using Tailscale cert → proxies to openclaw internally
  # Setup: make cert   (generates cert via tailscale cert command)
  # Access: https://${TAILSCALE_HOSTNAME}:${NGINX_HTTPS_PORT}
  # ============================================================================
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: ${TEAM_NAME:-sempre}-nginx
    environment:
      - TAILSCALE_HOSTNAME=${TAILSCALE_HOSTNAME}
      - NGINX_OPENCLAW_PORT=${NGINX_OPENCLAW_PORT:-20443}
      - NGINX_OLLAMA_PORT=${NGINX_OLLAMA_PORT:-11434}
      - NGINX_N8N_PORT=${NGINX_N8N_PORT:-20678}
    volumes:
      - ${HOST_SSL_DIR:-~/.nexus/ssl}:/etc/ssl/openclaw:ro
    ports:
      - "${NGINX_OPENCLAW_PORT:-20443}:443" # OpenClaw (HTTPS)
      - "${NGINX_HTTP_PORT:-20080}:80" # HTTP — nginx returns 444
      - "${NGINX_OLLAMA_PORT:-11434}:${NGINX_OLLAMA_PORT:-11434}" # Ollama API (HTTPS)
      - "${NGINX_N8N_PORT:-20678}:${NGINX_N8N_PORT:-20678}" # n8n (HTTPS)
    restart: unless-stopped
    networks:
      default:
        aliases:
          - agentic_nexus_bridge
    depends_on:
      - openclaw
    healthcheck:
      test: [ "CMD-SHELL", "nginx -t 2>/dev/null && echo ok" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================================
  # n8n – Workflow Automation (schedule, integrate, automate)
  # Access: https://${TAILSCALE_HOSTNAME}:${NGINX_N8N_PORT}
  # ============================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: ${TEAM_NAME:-sempre}-n8n
    environment:
      - DB_TYPE=sqlite
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change_me}
      - GENERIC_TIMEZONE=${USER_TIMEZONE:-Asia/Bangkok}
      - WEBHOOK_URL=http://n8n:5678
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_DEFAULT_USER_EMAIL=admin@local
      - N8N_DEFAULT_USER_PASSWORD=${N8N_PASSWORD:-changeme}
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      default:
        aliases:
          - agentic_nexus_bridge
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ────────────────────────────────────────────────────
  # Paperclip — Orchestrator Agent
  # Responsible for planning and delegating tasks to
  # worker agents over the agentic_nexus_bridge network.
  # ────────────────────────────────────────────────────
  paperclip:
    build:
      context: ./docker/paperclip
      dockerfile: Dockerfile
    container_name: paperclip
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AGENT_ROLE=orchestrator
      - AGENT_NAME=paperclip
      - OPENCLAW_URL=http://openclaw:8001
      - HOST=0.0.0.0
      - PAPERCLIP_HOME=/paperclip
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PAPERCLIP_DEPLOYMENT_MODE=authenticated
      - PAPERCLIP_DEPLOYMENT_EXPOSURE=private
      - PAPERCLIP_PUBLIC_URL=${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    volumes:
      - paperclip_data:/app/data
      - "${PAPERCLIP_DATA_DIR:-../data/docker-paperclip}:/paperclip"
    networks:
      - agentic_nexus_bridge
    depends_on:
      openclaw:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
